---
- name: Install required dependencies
  become: yes
  ansible.builtin.apt:
    name:
      - fontconfig
      - openjdk-17-jre   # or openjdk-21-jre on newer Debian/Ubuntu
    state: present
    update_cache: yes

- name: Add Jenkins repository signing key (2026-era key)
  become: yes
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'
    force: true   # useful during key rotation periods

- name: Add Jenkins stable (LTS) repository
  become: yes
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins-stable
    update_cache: yes   # or do a separate apt update task

- name: Install Jenkins from official repository
  become: yes
  ansible.builtin.apt:
    name: jenkins
    state: present
    update_cache: yes

- name: Start and enable Jenkins service
  become: yes
  ansible.builtin.service:
    name: jenkins
    state: started
    enabled: yes

- name: Add jenkins user to docker group (if using Docker agents)
  become: yes
  ansible.builtin.user:
    name: jenkins
    groups: docker
    append: yes